# compose.yml — base composition for the production stack on the VPS.
# Layered with docker/supabase/docker-compose.yml + compose.boot.yml
# (+ compose.prod.yml for memory caps) at deploy time. See scripts/deploy.sh
# for the canonical bring-up command.
#
# Backup service intentionally absent — added in Phase 10.
#
# Service-name conventions: every service we own is `kiba-<name>` to avoid
# Docker network alias collisions with tenki on the shared edge network.
# Tenki's caddy fragment looks up bare names like `web`, `admin`, `kong`,
# and edge-caddy-1 is on multiple networks (edge_net + tenki + kiba), so an
# unprefixed service name on our side would shadow tenki's. See PR #11 for
# the post-mortem.

name: kibarometer

networks:
  default:
    # External so the network survives `compose down` — Caddy stays connected
    # via `docker network connect kiba edge-caddy-1` (run by deploy.sh on
    # every push) without needing a reconnect each redeploy. bootstrap.sh
    # creates the network; compose just attaches.
    name: kiba
    external: true

volumes:
  redis_data:

services:
  kiba-web:
    container_name: kiba-web
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    env_file:
      - /opt/kibarometer/env/.env.production
    depends_on:
      kong: { condition: service_healthy }
      kiba-redis: { condition: service_started }
    # ONLY on the kiba network. Edge-caddy reaches us via `docker network
    # connect kiba edge-caddy-1` (deploy.sh). NOT on edge_net — joining
    # edge_net would register `kiba-web` on the same network as tenki-web
    # and risk alias bleed.
    networks: [default]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
    mem_limit: 384m

  kiba-redis:
    container_name: kiba-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    mem_limit: 64m

  kiba-fetcher:
    container_name: kiba-fetcher
    image: alpine:3.20
    restart: unless-stopped
    env_file:
      - /opt/kibarometer/env/fetcher.env
    volumes:
      # deploy.sh places these alongside server.js + sections/ + nav/ at
      # /opt/kibarometer/admin/. Single-source-of-truth = the repo's scripts/.
      - /opt/kibarometer/admin/fetcher-entrypoint.sh:/entrypoint.sh:ro
      - /opt/kibarometer/admin/fetcher-crontab:/etc/cron-template:ro
    depends_on:
      kiba-admin: { condition: service_healthy }
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    mem_limit: 32m
