# compose.yml — base composition for the production stack on Apollo.
# Layered with docker/supabase/docker-compose.yml + compose.boot.yml
# (+ compose.prod.yml for memory caps) at deploy time. See scripts/deploy.sh
# for the canonical bring-up command.
#
# Service-name conventions: every service we own is `kiba-<name>`. This was
# originally a workaround for alias collisions with tenki on a shared edge
# network (see PR #11); now that we own the whole stack on Apollo, the
# prefix is just a name convention. The kong-alias-strip block in deploy.sh
# is also a vestige of that era and will be removed in a follow-up.

name: kibarometer

networks:
  default:
    # External so the network survives `compose down`. bootstrap.sh creates
    # the network; compose just attaches. `kiba-edge-caddy` is on this
    # network and binds host 80/443, so external traffic reaches the rest
    # of the stack through it.
    name: kiba
    external: true

volumes:
  redis_data:

services:
  kiba-web:
    container_name: kiba-web
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    env_file:
      - /opt/kibarometer/env/.env.production
    depends_on:
      kong: { condition: service_healthy }
      kiba-redis: { condition: service_started }
    # Reached by kiba-edge-caddy over the `kiba` Docker network — no
    # port published to the host (edge Caddy is the only public-facing
    # service in this stack).
    networks: [default]
    healthcheck:
      # 127.0.0.1, not localhost — busybox wget in the next-standalone image
      # resolves localhost to ::1 first, but next.js binds IPv4 only.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
    mem_limit: 384m

  kiba-redis:
    container_name: kiba-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    mem_limit: 64m

  kiba-fetcher:
    container_name: kiba-fetcher
    image: alpine:3.20
    restart: unless-stopped
    env_file:
      - /opt/kibarometer/env/fetcher.env
    volumes:
      # deploy.sh places these alongside server.js + sections/ + nav/ at
      # /opt/kibarometer/admin/. Single-source-of-truth = the repo's scripts/.
      - /opt/kibarometer/admin/fetcher-entrypoint.sh:/entrypoint.sh:ro
      - /opt/kibarometer/admin/fetcher-crontab:/etc/cron-template:ro
    depends_on:
      # Phase F PR 4: cron URLs (/admin/api/jobs/*) moved into kiba-web.
      # The crontab itself is unchanged.
      kiba-web: { condition: service_healthy }
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    mem_limit: 32m

  # Phase G — self-hosted Umami for visitor analytics. Reads its own database
  # `umami` inside kiba-supabase-db (provisioned by 0009_umami_db.sql; Umami
  # runs its own Prisma migrations on first boot). Reachable from kiba-web
  # at kiba-umami:3000 for the /admin/analytics API calls; the public tracker
  # script + collect endpoint are exposed via the edge as /_umami/* (see
  # docker/edge/sites/kibarometer.caddy). The admin UI itself is NOT routed
  # publicly — first-time setup is via SSH port-forward.
  kiba-umami:
    container_name: kiba-umami
    # Track latest Umami. Self-hosted has no API-keys UI in any version
    # (cloud-only feature) — lib/admin/umami.ts authenticates by POSTing
    # username/password to /api/auth/login and caching the returned JWT,
    # which is the same flow Umami's own dashboard uses internally.
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    env_file:
      - /opt/kibarometer/env/umami.env
    # Bind to VPS-localhost only, NOT 0.0.0.0. The Umami admin UI is never
    # exposed publicly — only reachable via SSH tunnel:
    #   ssh -L 3001:127.0.0.1:3001 deploy@193.200.238.120
    # Same security model as Supabase Studio: admin-only, SSH-gated.
    ports:
      - "127.0.0.1:3001:3000"
    networks: [default]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 256m

  # Phase 9 — nightly backups to Backblaze B2 via rclone.
  # Cron at 03:00 inside the container. The script uses `docker exec` against
  # kiba-supabase-db via the host socket (matches tenki's pattern). Same
  # apk-add-on-boot trick as kiba-fetcher to keep image size at the alpine
  # baseline. backup.env (B2 creds) is generated as a stub by
  # generate-secrets.sh — the user fills in the B2 application key after
  # creating the bucket in the Backblaze console.
  kiba-backup:
    container_name: kiba-backup
    image: alpine:3.20
    restart: unless-stopped
    env_file:
      - /opt/kibarometer/env/backup.env
    volumes:
      # deploy.sh copies scripts/backup.sh into /opt/kibarometer/admin/.
      - /opt/kibarometer/admin/backup.sh:/backup.sh:ro
      # Read-only socket is misleading (the API still does writes through
      # the daemon) but matches tenki's convention. Needed for `docker exec`
      # against kiba-supabase-db.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "apk add --no-cache docker-cli rclone tzdata curl &&
       echo '0 3 * * * /backup.sh' | crontab - &&
       crond -f -l 2"
    mem_limit: 64m

  # PR scrapegraph-sidecar — Python service that wraps scrapegraphai
  # (URL discovery via DuckDuckGo + LLM-driven extraction via the local
  # MLX cluster). Internal-only on the kiba network; never exposed to
  # the edge. kiba-web posts to http://kiba-scraper:8000/{discover,extract}.
  kiba-scraper:
    container_name: kiba-scraper
    build:
      context: docker/scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      # Reuses MLX_BASE_URL + MLX_API_KEY already in the kiba-web env.
      # Same secret, no new env file.
      - /opt/kibarometer/env/.env.production
    networks: [default]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status==200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 1g

  # Internal-only reverse proxy. NO public ports — Cloudflare Tunnel
  # terminates TLS at Cloudflare's edge and tunnels HTTP into the docker
  # network via the cloudflared sidecar. Caddy then path-routes between
  # kiba-web, kiba-supabase-kong, and kiba-umami (using handle_path to
  # strip /supabase and /_umami prefixes — see docker/edge/sites/).
  #
  # Reads docker/edge/Caddyfile (umbrella) which imports sites/*.caddy.
  # deploy.sh stages both into /opt/kibarometer/edge/ BEFORE `compose up`
  # so the bind mounts resolve on first start.
  #
  # No ACME, no Let's Encrypt — Cloudflare provides edge TLS.
  # /opt/kibarometer/edge/data and /config are bind-mounted but empty in
  # practice (Caddy uses them for its own state; harmless if unused).
  #
  # No depends_on — Caddy starts independently so cloudflared can connect
  # to it as soon as it's healthy.
  kiba-edge-caddy:
    container_name: kiba-edge-caddy
    image: caddy:2-alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - /opt/kibarometer/edge/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/kibarometer/edge/sites:/etc/caddy/sites:ro
      - /opt/kibarometer/edge/data:/data
      - /opt/kibarometer/edge/config:/config
    networks: [default]
    mem_limit: 128m

  # Cloudflare Tunnel daemon. Connects outbound to Cloudflare's edge.
  # Locally-managed mode (CLI-created, no Zero Trust dashboard signup):
  #   1. Operator runs `cloudflared tunnel login` + `tunnel create` on the
  #      host to mint /opt/kibarometer/cloudflared/credentials.json.
  #   2. config.yml (committed at docker/cloudflared/config.yml) declares
  #      ingress rules — every public hostname points at kiba-edge-caddy:80,
  #      Caddy then path-routes internally.
  #   3. deploy.sh stages config.yml to /opt/kibarometer/cloudflared/ on
  #      every push; credentials.json is created once and never overwritten.
  #
  # Public traffic flow: browser → CF edge (TLS) → tunnel → cloudflared
  #   → kiba-edge-caddy:80 → kiba-web / kong / kiba-umami.
  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml --no-autoupdate run
    volumes:
      - /opt/kibarometer/cloudflared:/etc/cloudflared:ro
    networks: [default]
    depends_on:
      kiba-edge-caddy: { condition: service_started }
    mem_limit: 64m
