name: CI
on:
  pull_request:
  push:
    branches-ignore: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      # No `version:` here — pnpm/action-setup reads from package.json's
      # `packageManager` field (currently pnpm@9.12.0). Specifying both
      # errors with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint PostgREST upserts
        # Catches the retag-shaped-upsert defect from PR #172: a POST
        # to /<table>?on_conflict=… with merge-duplicates whose body
        # omits a NOT NULL no-default column. PostgreSQL validates
        # NOT NULL on the proposed INSERT row BEFORE routing to DO
        # UPDATE, so the upsert fails even when every row exists.
        run: pnpm lint:postgrest

      - name: Test
        run: pnpm test

      - name: Build (with placeholder env)
        env:
          NEXT_PUBLIC_SITE_URL: https://kibarometer.no
          NEXT_PUBLIC_SUPABASE_URL: https://kibarometer.no/supabase
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
          SUPABASE_SERVICE_ROLE_KEY: dummy
          SUPABASE_INTERNAL_URL: http://localhost:8000
        run: pnpm build

      - name: Gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --no-banner

      - name: Validate supabase compose was forked
        # Catch regressions where someone re-lifts the upstream supabase
        # compose without re-running scripts/fork-supabase-compose.sh.
        run: |
          ! grep -qE '^\s*container_name:\s*supabase-' docker/supabase/docker-compose.yml
          ! grep -q '/opt/tenki/' docker/supabase/docker-compose.yml
          # Project name must be kiba-namespaced. Upstream ships `name: supabase`,
          # which collides with other supabase stacks on the shared Apollo host —
          # their `compose up --remove-orphans` then deletes kiba-supabase-db as an
          # orphan of project `supabase`, taking admin login down. This guard is the
          # piece that was missing for months. See docker/supabase/docker-compose.yml.
          grep -qE '^name:\s*kibarometer\s*$' docker/supabase/docker-compose.yml
          ! grep -qE '^name:\s*supabase\s*$' docker/supabase/docker-compose.yml

      - name: Validate stripped supabase services stay stripped
        # Phase 0.5 stripped storage/imgproxy/realtime/edge-functions/vector/
        # supavisor. If anyone re-introduces them via merge or fresh fork,
        # CI catches it here.
        run: |
          ! grep -qE '^\s+(storage|imgproxy|realtime|functions|vector|supavisor):$' docker/supabase/docker-compose.yml
