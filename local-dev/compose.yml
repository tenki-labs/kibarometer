# Local-dev override. Pairs with docker/supabase/docker-compose.yml.
#
# Stack: db + kong + auth + rest + meta + studio + redis.
# (storage / imgproxy / realtime / functions / vector / supavisor were stripped
#  in Phase 0.5 — they don't exist in our forked supabase compose at all.)
# Phase F PR 4: legacy `admin` (zero-deps Node, port 4000) and `fetcher`
# services were removed — the new admin runs inside `pnpm dev` on :3000.
#
# All persistent data lives under local-dev/data/ — gitignored, host-owned.
#
# Bind-mount sources reference ${KIBA_REPO_ROOT}, an absolute path written into
# local-dev/.env by setup.sh. Resolving via the .env file (instead of shell
# ${PWD}) is sudo/cron/IDE-terminal proof.
#
# File order matters: docker/supabase/docker-compose.yml comes FIRST so this
# file's `volumes: !override` actually replaces the upstream values (overrides
# are applied in -f order; the LAST file's values win).
#
# Bring up:   docker compose --env-file local-dev/.env \
#               -f docker/supabase/docker-compose.yml -f local-dev/compose.yml up -d
# Tear down (preserve data):  same files, `down`
# Wipe data:                  rm -rf local-dev/data/

name: kiba-dev

services:
  redis:
    image: redis:7-alpine
    container_name: kiba-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    mem_limit: 64m

  # Phase G — local Umami. Exposed on host port 3001 so the operator can hit
  # the dashboard directly (no edge proxy in local dev). The `umami` database
  # is provisioned by migration 0009 on first apply; Umami runs its own
  # Prisma migrations on first boot. Local /admin/analytics will show
  # "not configured" until UMAMI_API_KEY + UMAMI_WEBSITE_ID are set in
  # .env.local.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: kiba-umami
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/umami
      HASH_SALT: local-dev-hash-salt-change-me
      APP_SECRET: local-dev-app-secret-change-me
    ports:
      - "3001:3000"
    mem_limit: 256m

  # Redirect db's bind-mount paths into local-dev/data/ so /opt/kibarometer is
  # never touched. Init-script paths reference the upstream supabase compose's
  # volumes/ dir, hydrated by setup.sh from the supabase upstream repo.
  db:
    volumes: !override
      - ${KIBA_REPO_ROOT}/docker/supabase/volumes/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:Z
      - ${KIBA_REPO_ROOT}/docker/supabase/volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:Z
      - ${KIBA_REPO_ROOT}/docker/supabase/volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ${KIBA_REPO_ROOT}/docker/supabase/volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ${KIBA_REPO_ROOT}/docker/supabase/volumes/db/_supabase.sql:/docker-entrypoint-initdb.d/migrations/97-_supabase.sql:Z
      - ${KIBA_REPO_ROOT}/docker/supabase/volumes/db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:Z
      - ${KIBA_REPO_ROOT}/docker/supabase/volumes/db/pooler.sql:/docker-entrypoint-initdb.d/migrations/99-pooler.sql:Z
      - ${KIBA_REPO_ROOT}/local-dev/data/postgres:/var/lib/postgresql/data:Z
      - db-config:/etc/postgresql-custom
    ports:
      - "5432:5432"
