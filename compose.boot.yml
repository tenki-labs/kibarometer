# compose.boot.yml — runtime overrides for the deployed stack.
#   - admin Node service (zero npm deps)
#   - kiba-web override for production tagged image
#   - supabase kong override (port + alias)
#
# Layered AFTER compose.yml + docker/supabase/docker-compose.yml.

services:
  kiba-web:
    image: kiba-web:latest
    build: !reset null
    environment:
      NEXT_PUBLIC_SITE_URL: https://kibarometer.no
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    command: !override ["node", "server.js"]

  # Two overrides on the supabase kong service:
  #
  # 1. Drop host port bindings. kiba-edge-caddy reaches kong via docker DNS
  #    (`kiba-supabase-kong:8000`) — kong is internal-only on the kiba
  #    network, never published to the host.
  #
  # 2. Cap nginx_worker_processes to 4. Default `auto` matches host CPU count.
  #    On Apollo (24 cores) that spawns 24 nginx workers, and kong's internal
  #    lua-resty-events IPC fanout (N*(N-1)/2 = 276 unix-socket channels)
  #    overwhelms the kernel's SCM_RIGHTS fd-passing, causing endless
  #    `sendmsg() failed (109: Too many references: cannot splice)` and
  #    pegging kong at 3000+% CPU. 4 workers handles our traffic comfortably
  #    and keeps the IPC fanout at a sane 6 channels.
  kong:
    ports: !reset null
    environment:
      KONG_NGINX_WORKER_PROCESSES: "4"
